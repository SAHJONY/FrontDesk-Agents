name: Uptime watchdog

# Checks production from outside every 15 minutes. On sustained failure it
# alerts the owner directly through Bland.ai (a real phone call) — this works
# even when the entire platform is down, because the call is placed from the
# GitHub runner, not from the platform.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        id: first
        continue-on-error: true
        run: |
          set -e
          H=$(curl -s --max-time 20 https://www.frontdeskagents.com/api/health)
          echo "$H" | grep -q '"ok":true'
          curl -s -o /dev/null -w '%{http_code}' --max-time 20 https://www.frontdeskagents.com/ | grep -q 200

      - name: Re-check after 45s (avoid flapping)
        id: second
        if: steps.first.outcome == 'failure'
        continue-on-error: true
        run: |
          sleep 45
          set -e
          H=$(curl -s --max-time 20 https://www.frontdeskagents.com/api/health)
          echo "$H" | grep -q '"ok":true'

      - name: Phone the owner via Bland
        if: steps.first.outcome == 'failure' && steps.second.outcome == 'failure'
        run: |
          curl -s --max-time 30 -X POST https://api.bland.ai/v1/calls \
            -H "authorization: ${{ secrets.BLAND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "phone_number": "${{ secrets.ALERT_PHONE }}",
              "from": "${{ secrets.ALERT_CALLER_ID }}",
              "task": "You are Ava from FrontDeskAgents.com calling with an URGENT production alert. Say exactly this, calmly and clearly: The FrontDesk Agents website is DOWN. Production monitoring detected the site is not responding. Please check Vercel and the admin dashboard as soon as possible. Repeat the core message once if asked, answer briefly, then end the call.",
              "voice": "maya",
              "max_duration": 3
            }'

      - name: Fail the run if site is down (red X + GitHub email)
        if: steps.first.outcome == 'failure' && steps.second.outcome == 'failure'
        run: exit 1
