name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontdesk-agents/package-lock.json'

      - name: Install dependencies
        run: cd frontdesk-agents && npm ci

      - name: Run tests
        run: cd frontdesk-agents && npx vitest run --reporter=verbose

      - name: Build (no lint)
        run: cd frontdesk-agents && npx next build --no-lint
